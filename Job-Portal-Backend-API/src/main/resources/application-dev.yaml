spring:
  datasource:
    url: jdbc:mysql://localhost:3306/job_portal
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      repositories:
        enabled: false

origin: http://localhost:3000

server:
  port: 8087

  freemarker:
    enabled: true
    template-loader-path: classpath:/templates/
    suffix: .ftl
    content-type: text/html
    charset: UTF-8
    cache: false

jwt:
  secret: ZWNGS342YzQ3MTI0Y2ESDFWEFDHfnfEDFJdibcDGNgdGFBNJgjbU2Nzg5MGFiYw=+=

logging:
  pattern:
    console: "%clr(%6p) [ Job portal ]%clr(%m){ Greeen }%n"
  level:
    root: "info"
    com.jobportal: "debug"
    org.hibernate: "error"
    tomcat: "trace"
    register-shutdown-hook: false
